<section class="lab-teaser" aria-label="A teaser of my lab">
    <div class="lab-teaser-header" appScrollReveal [animationType]="'fade-left'">
        <div class="lab-teaser-label pink" aria-hidden="true">~/lab</div>
        <h2 class="lab-teaser-title value">What I do for <span class="pink">fun</span>.</h2>
        <p class="lab-teaser-caption value">A space for experiments, side projects, and things that don't fit anywhere else — design, code, hardware.</p>
        <a routerLink="/lab" class="lab-link" aria-label="Visit the lab">cd ./<span class="pink">lab</span> <svg lucideArrowRight></svg></a>
    </div>
    <div class="teaser-group-container">
        @for (entry of selectedEntries; track $index) {
            <a class="teaser-container" [routerLink]="['/lab', entry.id]" aria-label="View this entry" [style.--category-color]="getCategoryColor(entry.category)" appScrollReveal [animationType]="'fade-up'" [animationDelay]="200 * $index">
                <span class="teaser-category rose" aria-label="Design project">{{entry.category}}</span>
                <div class="teaser-title value">{{entry.title}}</div>
                <div class="teaser-description key">{{entry.caption}}</div>
                <svg lucideArrowRight aria-hidden="true"></svg>
            </a>
        }
    </div>
</section>
