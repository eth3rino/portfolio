<section class="lab-wrapper">
    <div class="lab-header">
        <div class="header-text">
            <div class="lab-label" aria-hidden="true">~/lab</div>
            <h1 class="lab-title value">Things I build for <span class="pink">fun</span>.</h1>
        </div>
        <div class="stats-container value">
            <span class="stat entry-count" aria-label="entries">{{entryCount}}<span class="stat-label key" aria-hidden="true">// <span class="pink">entries</span></span></span>
            <span class="stat category-count" aria-label="categories">{{categoryCount}}<span class="stat-label key" aria-hidden="true">// <span class="pink">categories</span></span></span>
            <span class="stat in-progress-count" aria-label="in progress">{{inProgressCount}}<span class="stat-label key" aria-hidden="true">// <span class="pink">in progress</span></span></span>
        </div>
    </div>
    <app-featured [mainCards]="mainCards" [smallCards]="smallCards"></app-featured>
    <app-entry-grid [entries]="allEntries"></app-entry-grid>
</section>
