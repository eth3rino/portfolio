<div class="featured-container">
    <h2 class="featured-label key" aria-label="Featured lab entries">// featured</h2>
    <div class="main-featured">
        @for (card of mainCards(); track $index) {
            <a [routerLink]="['/lab', card.id]" class="main-card-container" [style.--category-color]="getCategoryColor(card.category)" appScrollReveal>
                <img class="card-image" [src]="card.image.src" [alt]="card.image.alt"/>
                <div class="card-text">
                    <div class="card-text-information">
                        <span class="card-category" [aria-label]="`Category: ${card.category}`">{{card.category}}</span>
                        <span class="card-status key" [aria-label]="`Status: ${card.status}`">{{card.status}}</span>
                    </div>
                    <h3 class="card-title value">{{card.title}}</h3>
                    <p class="card-caption value">{{card.caption}}</p>
                </div>
            </a>
        }
    </div>
    <div class="small-featured">
        @for (card of smallCards(); track $index) { 
            <a [routerLink]="['/lab', card.id]" class="small-card-container" [style.--category-color]="getCategoryColor(card.category)" appScrollReveal [animationDelay]="100 * $index">
                <div class="card-text-information">
                    <span class="card-category" [aria-label]="`Category: ${card.category}`">{{card.category}}</span>
                    <span class="card-status key" [aria-label]="`Status: ${card.status}`">{{card.status}}</span>
                </div>
                <h4 class="card-title value">{{card.title}}</h4>
                <p class="card-caption value">{{card.caption}}</p>
            </a>
        }
    </div>
</div>
